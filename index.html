<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>単語帳アプリ</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#3b6ef5">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="単語帳">
<style>
  :root { --bg:#f5f5f7; --card:#fff; --line:#ddd; --accent:#3b6ef5; --danger:#e34; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:system-ui,"Hiragino Sans","Yu Gothic",sans-serif; background:var(--bg); color:#222;
         padding-bottom:env(safe-area-inset-bottom); }
  header { background:var(--accent); color:#fff; padding:calc(12px + env(safe-area-inset-top)) 16px 12px; font-weight:700; font-size:18px; }
  .tabs { display:flex; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
  .tabs button { flex:1; padding:12px 4px; border:0; background:none; font-size:14px; cursor:pointer; color:#666; }
  .tabs button.on { color:var(--accent); border-bottom:2px solid var(--accent); font-weight:700; }
  main { padding:16px; max-width:760px; margin:0 auto; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:16px; }
  label { display:block; font-size:13px; color:#666; margin-bottom:4px; }
  input[type=text], input[type=password], textarea { width:100%; padding:10px; border:1px solid var(--line); border-radius:8px; font-size:16px; }
  select { padding:10px; border:1px solid var(--line); border-radius:8px; font-size:15px; background:#fff; color:#222; }
  button.btn { background:var(--accent); color:#fff; border:0; padding:12px 16px; border-radius:8px; font-size:15px; cursor:pointer; }
  button.btn:disabled { opacity:.5; cursor:default; }
  button.ghost { background:#eee; color:#333; }
  button.del { background:none; border:0; color:var(--danger); cursor:pointer; font-size:14px; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:6px 4px; border-bottom:1px solid var(--line); text-align:left; font-size:14px; vertical-align:top; }
  td input { width:100%; padding:8px; border:1px solid var(--line); border-radius:6px; font-size:15px; }
  .muted { color:#888; font-size:13px; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  #preview { max-width:100%; border-radius:8px; margin-top:8px; display:none; }
  .deck-item { display:flex; justify-content:space-between; gap:8px; padding:10px 0; border-bottom:1px solid var(--line); }
  .word { font-weight:700; font-size:16px; }
  .pron { color:#666; font-family:"Doulos SIL","Charis SIL",serif; line-height:1.5; }
  .flash { text-align:center; padding:48px 16px; min-height:160px; cursor:pointer; user-select:none; }
  .flash .big { font-size:34px; font-weight:700; }
  .spinner { display:inline-block; width:16px; height:16px; border:3px solid var(--accent); border-top-color:transparent; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hide { display:none; }
  #installBtn { margin-top:8px; }
  .modeBtn { padding:8px 20px; border:1px solid var(--accent); background:#fff; color:var(--accent); font-size:14px; cursor:pointer; }
  .modeBtn:first-child { border-radius:8px 0 0 8px; }
  .modeBtn:last-child { border-radius:0 8px 8px 0; border-left:0; }
  .modeBtn.on { background:var(--accent); color:#fff; }
  .acc1, .acc2 { position:relative; display:inline-block; }
  .acc1::before, .acc2::before { position:absolute; left:0; right:0; top:-0.26em; text-align:center; font-size:0.8em; line-height:1; }
  .acc1::before { content:'´'; }
  .acc2::before { content:'ˋ'; }
</style>
</head>
<body>
<header>📒 単語帳アプリ</header>
<div class="tabs">
  <button data-tab="scan" class="on">📷 取り込み</button>
  <button data-tab="deck">📚 単語帳</button>
  <button data-tab="study">🎴 学習</button>
  <button data-tab="set">⚙ 設定</button>
</div>
<main>

  <!-- 取り込み -->
  <section id="tab-scan">
    <div class="card">
      <label>プリントの画像を取り込む</label>
      <input type="file" id="fileCamera" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="filePick" accept="image/*" style="display:none">
      <div class="row">
        <button class="btn" id="btnCamera">📷 写真を撮る</button>
        <button class="ghost btn" id="btnPick">🖼 ファイルから選択</button>
      </div>
      <img id="preview">
      <div class="row" style="margin-top:12px">
        <button class="btn" id="analyze" disabled>単語を読み取る</button>
        <span id="scanMsg" class="muted"></span>
      </div>
    </div>

    <div class="card hide" id="resultCard">
      <label>読み取り結果(編集できます)</label>
      <table id="resultTbl">
        <thead><tr><th>単語</th><th>発音</th><th>意味</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="row" style="margin-top:12px">
        <button class="ghost btn" id="addRow">＋行を追加</button>
      </div>
      <div class="row" style="margin-top:12px">
        <label style="margin:0">追加先</label>
        <select id="targetDeck" style="flex:1"></select>
        <button class="btn" id="addDeck">追加</button>
      </div>
    </div>
  </section>

  <!-- 単語帳 -->
  <section id="tab-deck" class="hide">
    <!-- 単語帳の一覧 -->
    <div id="deckListView">
      <div class="card">
        <div class="row" style="justify-content:space-between">
          <span class="muted">単語帳を選んでください</span>
          <button class="ghost btn" id="newDeck">＋新規</button>
        </div>
        <div id="deckIndex"></div>
      </div>
    </div>
    <!-- 単語帳の中身 -->
    <div id="deckDetailView" class="hide">
      <div class="card">
        <div class="row" style="justify-content:space-between">
          <button class="ghost btn" id="backToDecks">← 一覧へ</button>
          <button class="del" id="delDeck">この単語帳を削除</button>
        </div>
        <div style="margin-top:10px">
          <span class="word" id="deckTitle"></span> <span id="deckCount" class="muted"></span>
        </div>
        <div id="deckList"></div>
      </div>
    </div>
  </section>

  <!-- 学習 -->
  <section id="tab-study" class="hide">
    <div class="card">
      <select id="studyDeck" style="width:100%;margin-bottom:12px"></select>
      <div style="display:flex;justify-content:center;margin-bottom:14px">
        <button class="modeBtn on" data-mode="mean">意味</button>
        <button class="modeBtn" data-mode="pron">発音</button>
      </div>
      <div style="display:flex;justify-content:center;margin-bottom:14px">
        <button class="modeBtn on" data-order="seq">順番</button>
        <button class="modeBtn" data-order="rand">ランダム</button>
      </div>
      <div class="flash" id="flash"><span class="muted">単語帳が空です</span></div>
      <p class="muted" style="text-align:center">カードをタップ:単語 →(タップ)→ 答え →(タップ)→ 次の単語</p>
    </div>
  </section>

  <!-- 設定 -->
  <section id="tab-set" class="hide">
    <div class="card">
      <label>Gemini API キー</label>
      <input type="password" id="apiKey" placeholder="AIza...">
      <div class="row" style="margin-top:8px">
        <button class="btn" id="saveKey">保存</button>
        <span id="keyMsg" class="muted"></span>
      </div>
      <p class="muted">
        キーは <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a> で無料取得できます。
        このブラウザ内(localStorage)にのみ保存され、外部には送信されません。
      </p>
      <label style="margin-top:12px">使用モデル</label>
      <input type="text" id="model" value="gemini-2.5-flash">
    </div>
    <div class="card">
      <label>アプリとして使う</label>
      <p class="muted">ホーム画面に追加すると、アプリのように全画面で起動できます。</p>
      <button class="btn hide" id="installBtn">ホーム画面に追加</button>
      <p class="muted" id="installHint">iPhoneは Safari の「共有」→「ホーム画面に追加」、Androidは Chrome のメニューから追加できます。</p>
    </div>
  </section>

</main>

<script>
const $ = s => document.querySelector(s);
const LS = { key:'vocab_apikey', model:'vocab_model', deck:'vocab_deck', decks:'vocab_decks' };

// ---- タブ切替 ----
document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => {
  document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  ['scan','deck','study','set'].forEach(t => $('#tab-'+t).classList.add('hide'));
  $('#tab-'+b.dataset.tab).classList.remove('hide');
  if (b.dataset.tab==='deck'){ $('#deckDetailView').classList.add('hide'); $('#deckListView').classList.remove('hide'); renderDeck(); }
  if (b.dataset.tab==='study') { studyIdx=0; studyStage=0; studyOrder=[]; renderStudy(); }
});

// ---- 設定 ----
$('#apiKey').value = localStorage.getItem(LS.key) || '';
if (localStorage.getItem(LS.model) === 'gemini-2.0-flash') localStorage.setItem(LS.model, 'gemini-2.5-flash');
$('#model').value  = localStorage.getItem(LS.model) || 'gemini-2.5-flash';
$('#saveKey').onclick = () => {
  localStorage.setItem(LS.key, $('#apiKey').value.trim());
  localStorage.setItem(LS.model, $('#model').value.trim() || 'gemini-2.5-flash');
  $('#keyMsg').textContent = '保存しました';
  setTimeout(()=>$('#keyMsg').textContent='',1500);
};

// ---- 画像選択(大きい写真はメモリ節約のため縮小・圧縮してから扱う) ----
let imgB64 = null, imgMime = null;
$('#btnCamera').onclick = () => $('#fileCamera').click();
$('#btnPick').onclick = () => $('#filePick').click();
$('#fileCamera').onchange = e => handleFile(e.target.files[0]);
$('#filePick').onchange = e => handleFile(e.target.files[0]);
function handleFile(f){
  if (!f) return;
  $('#analyze').disabled = true;
  $('#scanMsg').textContent = '画像を準備中…';
  const objUrl = URL.createObjectURL(f);
  const img = new Image();
  img.onload = () => {
    const MAX = 1600;
    let w = img.naturalWidth, h = img.naturalHeight;
    const scale = Math.min(1, MAX / Math.max(w, h));
    w = Math.round(w * scale); h = Math.round(h * scale);
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    cv.getContext('2d').drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(objUrl);
    let dataUrl;
    try { dataUrl = cv.toDataURL('image/jpeg', 0.8); }
    catch (err) { $('#scanMsg').textContent = '画像の処理に失敗しました'; return; }
    imgMime = 'image/jpeg';
    imgB64 = dataUrl.split(',')[1];
    $('#preview').src = dataUrl;
    $('#preview').style.display = 'block';
    $('#analyze').disabled = false;
    $('#scanMsg').textContent = '';
  };
  img.onerror = () => { URL.revokeObjectURL(objUrl); $('#scanMsg').textContent = '画像を読み込めませんでした'; };
  img.src = objUrl;
};

// ---- Gemini 解析 ----
$('#analyze').onclick = async () => {
  const key = localStorage.getItem(LS.key);
  if (!key) { alert('先に「設定」タブで API キーを保存してください'); return; }
  if (!imgB64) return;
  const model = localStorage.getItem(LS.model) || 'gemini-2.5-flash';
  const btn = $('#analyze');
  btn.disabled = true;
  $('#scanMsg').innerHTML = '<span class="spinner"></span> 読み取り中…';

  const prompt = `この画像は語学のプリントです。掲載されている見出し語をすべて抽出してください。
言語は単語から自動判別してください(例: ドイツ語・英語など)。
各語について次を返してください。
- word: 単語。画像から正確に読み取る。
- pronunciation: 発音記号(IPA)。プリントに記載があればそれを書き写す。空欄や記載がない場合は、あなたの知識でその単語の正しい発音記号を補完して必ず埋める。
- meaning: 日本語の意味。プリントに記載があればそれを使う。空欄や記載がない場合は、あなたの知識で正しい意味を補完して必ず埋める。
手書きの解答・氏名・日付・課題番号などのメタ情報は無視し、学習対象の単語のみ対象にします。`;

  const body = {
    contents: [{ parts: [
      { text: prompt },
      { inline_data: { mime_type: imgMime, data: imgB64 } }
    ]}],
    generationConfig: {
      responseMimeType: "application/json",
      responseSchema: {
        type: "ARRAY",
        items: {
          type: "OBJECT",
          properties: {
            word: { type:"STRING" },
            pronunciation: { type:"STRING" },
            meaning: { type:"STRING" }
          },
          required: ["word","pronunciation","meaning"]
        }
      }
    }
  };

  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || ('HTTP '+res.status));
    const txt = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!txt) throw new Error('応答が空でした');
    const items = JSON.parse(txt);
    fillResult(items);
    $('#scanMsg').textContent = `${items.length} 語を読み取りました`;
  } catch (err) {
    $('#scanMsg').textContent = 'エラー: ' + err.message;
  } finally {
    btn.disabled = false;
  }
};

// ---- 結果テーブル ----
function rowHtml(w='',p='',m=''){
  return `<tr>
    <td><input class="c-word" value="${esc(w)}"></td>
    <td><input class="c-pron" value="${esc(p)}"></td>
    <td><input class="c-mean" value="${esc(m)}"></td>
    <td><button class="del" onclick="this.closest('tr').remove()">×</button></td>
  </tr>`;
}
function fillResult(items){
  $('#resultTbl tbody').innerHTML = items.map(i=>rowHtml(i.word,i.pronunciation,i.meaning)).join('');
  $('#resultCard').classList.remove('hide');
  refreshTargetDeck();
}
$('#addRow').onclick = () => $('#resultTbl tbody').insertAdjacentHTML('beforeend', rowHtml());

// ---- 単語帳データ(複数デッキ) ----
function getDecks(){ try { return JSON.parse(localStorage.getItem(LS.decks))||[]; } catch { return []; } }
function saveDecks(d){ localStorage.setItem(LS.decks, JSON.stringify(d)); }
function newDeckId(){ return 'd' + Date.now() + Math.floor(Math.random()*1000); }
function ensureDecks(){
  let d = getDecks();
  if (!d.length){
    let old = [];
    try { old = JSON.parse(localStorage.getItem(LS.deck)) || []; } catch {}
    d = [{ id:newDeckId(), name:'マイ単語帳', cards:old }];
    saveDecks(d);
  }
  return d;
}
let currentDeckId = ensureDecks()[0].id;
function fillDeckOptions(sel, withNew){
  const decks = getDecks();
  sel.innerHTML = decks.map(d=>`<option value="${d.id}">${esc(d.name)}（${d.cards.length}）</option>`).join('')
    + (withNew ? '<option value="__new__">＋ 新しい単語帳…</option>' : '');
}
function promptNewDeck(){
  const name = (prompt('新しい単語帳の名前') || '').trim();
  if (!name) return null;
  const decks = getDecks();
  const id = newDeckId();
  decks.push({ id, name, cards:[] });
  saveDecks(decks);
  return id;
}

function refreshTargetDeck(){ fillDeckOptions($('#targetDeck'), true); $('#targetDeck').value = currentDeckId; }
$('#targetDeck').onchange = () => {
  if ($('#targetDeck').value === '__new__'){
    const id = promptNewDeck();
    if (id) currentDeckId = id;
    refreshTargetDeck();
  } else currentDeckId = $('#targetDeck').value;
};
$('#addDeck').onclick = () => {
  let deckId = $('#targetDeck').value;
  if (deckId === '__new__'){ const id = promptNewDeck(); if (!id) return; deckId = id; }
  const decks = getDecks();
  const deck = decks.find(x=>x.id===deckId);
  if (!deck){ alert('追加先の単語帳を選んでください'); return; }
  let n = 0;
  $('#resultTbl tbody').querySelectorAll('tr').forEach(tr=>{
    const w = tr.querySelector('.c-word').value.trim();
    if (!w) return;
    deck.cards.push({ word:w, pron:tr.querySelector('.c-pron').value.trim(), mean:tr.querySelector('.c-mean').value.trim() });
    n++;
  });
  saveDecks(decks);
  currentDeckId = deckId;
  alert(`「${deck.name}」に ${n} 語を追加しました`);
  $('#resultCard').classList.add('hide');
  $('#resultTbl tbody').innerHTML='';
};

// 一覧(単語帳の名前と語数)。タップで中身へ。
function renderDeck(){
  const decks = getDecks();
  $('#deckIndex').innerHTML = decks.map(d=>`
    <div class="deck-item" style="cursor:pointer" onclick="openDeck('${d.id}')">
      <div>
        <div class="word">${esc(d.name)}</div>
        <div class="muted">${d.cards.length} 語</div>
      </div>
      <span class="muted" style="font-size:20px">›</span>
    </div>`).join('');
}
// 中身(選んだ単語帳の単語一覧)
function renderDeckDetail(){
  const deck = getDecks().find(d=>d.id===currentDeckId);
  if (!deck){ showDeckList(); return; }
  $('#deckTitle').textContent = deck.name;
  $('#deckCount').textContent = `(${deck.cards.length} 語)`;
  $('#deckList').innerHTML = deck.cards.length ? deck.cards.map((c,i)=>`
    <div class="deck-item">
      <div>
        <div class="word">${esc(c.word)} ${c.pron?`<span class="pron">[${fmtPron(c.pron)}]</span>`:''}</div>
        <div class="muted">${esc(c.mean)}</div>
      </div>
      <button class="del" onclick="delCard(${i})">削除</button>
    </div>`).join('') : '<p class="muted">まだ単語がありません</p>';
}
function showDeckList(){ $('#deckDetailView').classList.add('hide'); $('#deckListView').classList.remove('hide'); renderDeck(); }
window.openDeck = id => { currentDeckId = id; $('#deckListView').classList.add('hide'); $('#deckDetailView').classList.remove('hide'); renderDeckDetail(); };
$('#backToDecks').onclick = showDeckList;
$('#newDeck').onclick = () => { const id = promptNewDeck(); if (id) renderDeck(); };
$('#delDeck').onclick = () => {
  const decks = getDecks();
  if (decks.length <= 1){ alert('単語帳は最低1つ必要です'); return; }
  const deck = decks.find(d=>d.id===currentDeckId);
  if (!confirm(`「${deck.name}」を削除しますか?(中の単語も消えます)`)) return;
  saveDecks(decks.filter(d=>d.id!==currentDeckId));
  currentDeckId = getDecks()[0].id;
  showDeckList();
};
window.delCard = i => {
  const decks = getDecks();
  const deck = decks.find(d=>d.id===currentDeckId);
  deck.cards.splice(i,1);
  saveDecks(decks);
  renderDeckDetail();
};

// ---- 学習(タップで 単語 → 答え → 次の単語) ----
let studyIdx=0, studyStage=0, studyMode='mean', studyOrderType='seq', studyOrder=[];
function studyCards(){ const d = getDecks().find(x=>x.id===currentDeckId); return d ? d.cards : []; }
function shuffle(a){ for (let i=a.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }
function buildOrder(){
  studyOrder = [...Array(studyCards().length).keys()];
  if (studyOrderType==='rand') shuffle(studyOrder);
  studyIdx=0; studyStage=0;
}
function renderStudy(){
  const decks = getDecks();
  if (!decks.find(d=>d.id===currentDeckId)) currentDeckId = decks[0].id;
  fillDeckOptions($('#studyDeck'), false);
  $('#studyDeck').value = currentDeckId;
  const cards = studyCards();
  const el = $('#flash');
  if (!cards.length){ el.innerHTML='<span class="muted">この単語帳は空です</span>'; el.onclick=null; studyOrder=[]; return; }
  if (studyOrder.length !== cards.length) buildOrder();
  if (studyIdx >= studyOrder.length) studyIdx=0;
  const c = cards[studyOrder[studyIdx]];
  if (studyStage===0){
    el.innerHTML = `<div class="big">${esc(c.word)}</div><div class="muted">（タップで${studyMode==='mean'?'意味':'発音'}）</div>`;
  } else {
    let body;
    if (studyMode==='mean'){
      body = `<div class="big" style="font-size:26px">${esc(c.mean)||'(意味なし)'}</div>`;
    } else {
      body = `<div class="big pron" style="font-size:30px">${c.pron?'['+fmtPron(c.pron)+']':'(発音なし)'}</div>`
           + `<div class="muted" style="margin-top:4px">´ = アクセント(強く読む位置)</div>`;
    }
    el.innerHTML = `${body}<div class="muted">${studyIdx+1} / ${cards.length}（${studyOrderType==='rand'?'ランダム':'順番'}・タップで次へ)</div>`;
  }
  el.onclick = () => {
    if (!studyCards().length) return;
    if (studyStage===0) studyStage=1;
    else {
      studyStage=0; studyIdx++;
      if (studyIdx >= studyOrder.length){ if (studyOrderType==='rand') buildOrder(); else studyIdx=0; }
    }
    renderStudy();
  };
}
$('#studyDeck').onchange = () => { currentDeckId = $('#studyDeck').value; studyOrder=[]; studyStage=0; renderStudy(); };
document.querySelectorAll('[data-mode]').forEach(b => b.onclick = () => {
  document.querySelectorAll('[data-mode]').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  studyMode = b.dataset.mode; studyStage = 0; renderStudy();
});
document.querySelectorAll('[data-order]').forEach(b => b.onclick = () => {
  document.querySelectorAll('[data-order]').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  studyOrderType = b.dataset.order; buildOrder(); renderStudy();
});

function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// 発音記号の強勢記号(ˈ第一・ˌ第二)を消し、その音節内の最初の母音の真上にアクセント記号を表示
const IPA_VOWELS = 'aeiouyɛɔəʊɪøœɐɑæʌɒɜɨʉɯɤɵɞɘɶ';
function fmtPron(p){
  return esc(p).replace(/([ˈˌ])([^ˈˌ.\s]*)/g, (mAll, mark, syl) => {
    const cls = mark==='ˈ' ? 'acc1' : 'acc2';
    const chars = [...syl];
    let out = '', marked = false;
    for (let i = 0; i < chars.length; i++){
      const ch = chars[i];
      if (!marked && IPA_VOWELS.includes(ch.toLowerCase())){
        let v = ch; // 母音に続く結合記号(鼻音化など)はまとめる。長音ːは外に出す
        while (i+1 < chars.length && /[̀-ͯ]/.test(chars[i+1])) v += chars[++i];
        out += `<span class="${cls}">${v}</span>`;
        marked = true;
      } else {
        out += ch;
      }
    }
    if (!marked && chars.length) // 母音が無ければ先頭文字にマーク
      out = `<span class="${cls}">${chars[0]}</span>` + chars.slice(1).join('');
    return out;
  });
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  $('#installBtn').classList.remove('hide');
  $('#installHint').classList.add('hide');
});
$('#installBtn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  $('#installBtn').classList.add('hide');
};
